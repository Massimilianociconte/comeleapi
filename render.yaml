# ============================================================
# comeleapi — Render Blueprint (Backend API + Admin)
# ============================================================
services:
  - type: web
    name: comeleapi-backend
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev && npm run check:server && npm run check:security
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: "mailto:sara.bordenga@gmail.com"
      - key: PUBLIC_SITE_ORIGINS
        sync: false

# ============================================================
# COME LE API — Configurazione Netlify (sito pubblico)
# ============================================================

[build]
  publish = "."
  command = "echo 'Sito statico, nessun build necessario'"

# Canonical URL.
# Nota: https://www.comeleapi.netlify.app mostra errore certificato prima che
# Netlify possa applicare redirect. L'URL corretto del sottodominio Netlify è
# https://comeleapi.netlify.app, senza "www".
[[redirects]]
  from = "http://www.comeleapi.netlify.app/*"
  to = "https://comeleapi.netlify.app/:splat"
  status = 301
  force = true

# Headers di sicurezza
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# Cache lunga per gli asset statici
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Nessuna cache per HTML (possono cambiare)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

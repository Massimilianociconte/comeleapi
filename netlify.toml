# ============================================================
# comeleapi — Configurazione Netlify (sito pubblico)
# ============================================================

[build]
  publish = "dist"
  command = "npm run build:netlify"

# Il gestionale e il backend sono serviti e protetti da Render. Queste regole
# impediscono che un futuro errore di allowlist li renda nuovamente pubblici
# sul dominio statico Netlify.
[[redirects]]
  from = "/server.js"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/data/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/output/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/login.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/sw.js"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/render.yaml"
  to = "/index.html"
  status = 404
  force = true

# Canonical URL.
# Nota: https://www.comeleapi.netlify.app mostra errore certificato prima che
# Netlify possa applicare redirect. L'URL corretto del sottodominio Netlify è
# https://comeleapi.netlify.app, senza "www".
[[redirects]]
  from = "http://www.comeleapi.netlify.app/*"
  to = "https://comeleapi.netlify.app/:splat"
  status = 301
  force = true

# Headers di sicurezza
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    X-XSS-Protection = "0"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://wa.me; img-src 'self' data: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://comeleapi-backend.onrender.com; require-trusted-types-for 'script'; trusted-types comeleapi; upgrade-insecure-requests"

# Gli URL degli asset pubblici ricevono automaticamente un fingerprint di
# contenuto durante la build, quindi la cache immutabile resta sicura.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Il catalogo viene richiesto con fingerprint di contenuto dalla build.
[[headers]]
  for = "/products.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Nessuna cache per HTML (possono cambiare)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/links/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/foto-prodotti/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

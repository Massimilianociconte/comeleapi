# ============================================================
# comeleapi — Configurazione Netlify (sito pubblico)
# ============================================================

[build]
  publish = "."
  command = "echo 'Sito statico, nessun build necessario'"

# Canonical URL.
# Nota: https://www.comeleapi.netlify.app mostra errore certificato prima che
# Netlify possa applicare redirect. L'URL corretto del sottodominio Netlify è
# https://comeleapi.netlify.app, senza "www".
[[redirects]]
  from = "http://www.comeleapi.netlify.app/*"
  to = "https://comeleapi.netlify.app/:splat"
  status = 301
  force = true

# Headers di sicurezza
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    X-XSS-Protection = "0"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://wa.me; img-src 'self' data: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://comeleapi-backend.onrender.com; upgrade-insecure-requests"

# Cache lunga per gli asset statici
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Il catalogo e la guida possono essere aggiornati senza cambiare URL.
[[headers]]
  for = "/products.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/pdf/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Nessuna cache per HTML (possono cambiare)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"


[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/foto-prodotti/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
